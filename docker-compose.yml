services:
  mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - cipher-network
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/cipher-converter
      - AES_SECRET_KEY=${AES_SECRET_KEY:-default-secret-key}
      # Updated to match the new client port
      - CLIENT_URL=http://localhost:3005
    depends_on:
      - mongo
    networks:
      - cipher-network
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      # Changed from 3001 to 3005 to resolve the "port is already allocated" error
      - "3005:80"
    depends_on:
      - server
    networks:
      - cipher-network
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  cipher-network: