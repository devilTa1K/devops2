services:
  # ─── MongoDB Database ───────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - "27018:27017" # change port if needed per project
    volumes:
      - mongo-data:/data/db
    networks:
      - cipher-network
    restart: unless-stopped

  # ─── Express Backend ────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/cipher-converter
      - AES_SECRET_KEY=${AES_SECRET_KEY:-default-secret-key}
      - CLIENT_URL=http://localhost
    depends_on:
      - mongo
    networks:
      - cipher-network
    restart: unless-stopped

  # ─── React Frontend ─────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:80" # safer than using 80 directly
    depends_on:
      - server
    networks:
      - cipher-network
    restart: unless-stopped

# ─── Shared Resources ──────────────────────────────────
volumes:
  mongo-data:

networks:
  cipher-network:
